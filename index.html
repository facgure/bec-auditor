<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BEC Auditor Platform — Frontend Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
/* BEC Platform — Design Tokens */
:root {
  /* Neutrals — cool institutional */
  --ink-0: oklch(12% 0.01 250);
  --ink-1: oklch(22% 0.012 250);
  --ink-2: oklch(38% 0.012 250);
  --ink-3: oklch(55% 0.01 250);
  --ink-4: oklch(70% 0.008 250);

  --paper-0: oklch(99.2% 0.003 250);
  --paper-1: oklch(97.8% 0.004 250);
  --paper-2: oklch(95.5% 0.005 250);
  --paper-3: oklch(92% 0.006 250);
  --line: oklch(88% 0.008 250);
  --line-strong: oklch(80% 0.01 250);

  /* Accent — deep institutional teal-green (energy/efficiency mission) */
  --accent: oklch(45% 0.085 170);
  --accent-ink: oklch(38% 0.09 170);
  --accent-tint: oklch(95% 0.025 170);
  --accent-line: oklch(82% 0.05 170);

  /* Semantic */
  --ok: oklch(52% 0.11 155);
  --ok-tint: oklch(95% 0.035 155);
  --warn: oklch(68% 0.14 75);
  --warn-tint: oklch(96% 0.04 75);
  --err: oklch(55% 0.17 27);
  --err-tint: oklch(96% 0.03 27);
  --info: oklch(52% 0.10 245);
  --info-tint: oklch(96% 0.025 245);

  /* Type */
  --font-sans: "IBM Plex Sans Thai", "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

  /* Scale */
  --t-xs: 11px;
  --t-sm: 12.5px;
  --t-base: 14px;
  --t-md: 15px;
  --t-lg: 17px;
  --t-xl: 20px;
  --t-2xl: 26px;
  --t-3xl: 34px;
  --t-4xl: 44px;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 20px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-10: 40px;
  --sp-12: 48px;
  --sp-16: 64px;

  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 10px;
  --r-xl: 14px;

  --sidebar-w: 240px;
  --topbar-h: 56px;
}

[data-theme="dark"] {
  --ink-0: oklch(97% 0.005 250);
  --ink-1: oklch(90% 0.008 250);
  --ink-2: oklch(75% 0.01 250);
  --ink-3: oklch(60% 0.012 250);
  --ink-4: oklch(45% 0.01 250);
  --paper-0: oklch(17% 0.012 250);
  --paper-1: oklch(20% 0.012 250);
  --paper-2: oklch(24% 0.013 250);
  --paper-3: oklch(28% 0.014 250);
  --line: oklch(30% 0.015 250);
  --line-strong: oklch(38% 0.016 250);
  --accent: oklch(72% 0.11 170);
  --accent-ink: oklch(80% 0.11 170);
  --accent-tint: oklch(26% 0.035 170);
  --accent-line: oklch(36% 0.05 170);
  --ok-tint: oklch(26% 0.04 155);
  --warn-tint: oklch(28% 0.05 75);
  --err-tint: oklch(28% 0.05 27);
  --info-tint: oklch(26% 0.04 245);
}

[data-density="compact"] {
  --sp-4: 12px;
  --sp-5: 14px;
  --sp-6: 18px;
  --sp-8: 24px;
  --topbar-h: 48px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--t-base);
  color: var(--ink-1);
  background: var(--paper-1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.tnum { font-variant-numeric: tabular-nums; }

/* BEC — Component styles */

/* ============ APP SHELL ============ */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  background: var(--paper-1);
}
.app--noshell { display: block; grid-template-columns: 1fr; }

.sidebar {
  background: var(--paper-0);
  border-right: 1px solid var(--line);
  padding: var(--sp-5) 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar__brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 var(--sp-5) var(--sp-5);
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--sp-4);
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--ink-0);
  color: var(--paper-0);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 12px;
  position: relative;
}
.brand-mark::after{
  content:'';
  position:absolute;
  inset:3px;
  border: 1px solid var(--accent);
  border-radius: 3px;
  opacity: .5;
}
.sidebar__brand .brand-txt {
  display: flex; flex-direction: column; line-height: 1.15;
}
.sidebar__brand .brand-txt b { font-size: 13px; letter-spacing: .01em; }
.sidebar__brand .brand-txt span { font-size: 10.5px; color: var(--ink-3); font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase; }

.sidebar__section {
  padding: 0 var(--sp-3);
  margin-bottom: var(--sp-4);
}
.sidebar__label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 var(--sp-2) var(--sp-2);
}
.sidebar__item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  font-size: var(--t-sm);
  color: var(--ink-2);
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  line-height: 1.3;
}
.sidebar__item:hover { background: var(--paper-2); color: var(--ink-0); }
.sidebar__item.is-active {
  background: var(--accent-tint);
  color: var(--accent-ink);
  font-weight: 500;
}
.sidebar__item .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink-4);
  flex-shrink: 0;
}
.sidebar__item.is-active .dot { background: var(--accent); }
.sidebar__item .badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--paper-2);
  color: var(--ink-2);
}
.sidebar__item.is-active .badge { background: var(--accent); color: white; }

.sidebar__foot {
  margin-top: auto;
  padding: var(--sp-4) var(--sp-5);
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
  font-size: var(--t-sm);
}
.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-tint), var(--paper-2));
  color: var(--accent-ink);
  display: grid; place-items: center;
  font-weight: 600;
  font-size: 12px;
  font-family: var(--font-mono);
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.sidebar__foot .who { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
.sidebar__foot .who b { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar__foot .who span { font-size: 10.5px; color: var(--ink-3); font-family: var(--font-mono); }

/* ============ MAIN + TOPBAR ============ */
.main { min-width: 0; }
.topbar {
  height: var(--topbar-h);
  background: var(--paper-0);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-6);
  gap: var(--sp-4);
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(8px);
}
.crumb { display: flex; align-items: center; gap: 8px; font-size: var(--t-sm); color: var(--ink-3); }
.crumb .sep { color: var(--ink-4); }
.crumb .here { color: var(--ink-1); font-weight: 500; }
.topbar__search {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 4px 10px;
  width: 280px;
  font-size: var(--t-sm);
  color: var(--ink-3);
}
.topbar__search input { border: none; background: transparent; outline: none; flex: 1; width: 100%; }
.topbar__search kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--paper-0);
  color: var(--ink-3);
}
.iconbtn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  border: 1px solid var(--line);
  background: var(--paper-0);
  display: grid; place-items: center;
  color: var(--ink-2);
  position: relative;
}
.iconbtn:hover { background: var(--paper-2); }
.iconbtn .ping {
  position: absolute; top: 4px; right: 4px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--err);
  box-shadow: 0 0 0 2px var(--paper-0);
}

/* ============ PAGE CONTENT ============ */
.page { padding: var(--sp-8) var(--sp-8) var(--sp-12); max-width: 1400px; }
.page--narrow { max-width: 880px; }
.page__head { margin-bottom: var(--sp-8); }
.page__eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.page__eyebrow::before {
  content:''; display:inline-block; width: 18px; height: 1px; background: var(--accent);
}
.page__title {
  font-size: var(--t-3xl);
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink-0);
  margin: 0 0 8px;
  line-height: 1.15;
}
.page__sub { color: var(--ink-3); font-size: var(--t-md); max-width: 64ch; }

/* ============ CARDS / SURFACES ============ */
.card {
  background: var(--paper-0);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
}
.card__head {
  padding: var(--sp-5) var(--sp-6);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.card__head h3 { margin: 0; font-size: var(--t-md); font-weight: 600; color: var(--ink-0); }
.card__head .hint { font-size: var(--t-sm); color: var(--ink-3); }
.card__body { padding: var(--sp-6); }
.card__stepper-head { padding: 8px 24px; border-bottom: 1px solid var(--line); }
.card__body--form { padding: 32px; }
.card__footer {
  padding: 16px 24px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.card__footer__actions { margin-left: auto; display: flex; gap: 8px; }
.review-section-head {
  padding: 12px 20px;
  background: var(--paper-1);
  font-size: 11px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3);
}
.review-row {
  padding: 12px 20px;
  display: grid; grid-template-columns: 180px 1fr; gap: 16px;
  font-size: 14px;
}

.stat {
  padding: var(--sp-5) var(--sp-6);
  display: flex; flex-direction: column; gap: 4px;
  background: var(--paper-0);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
}
.stat__label { font-size: var(--t-xs); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; color: var(--ink-3); }
.stat__value { font-size: var(--t-3xl); font-weight: 500; color: var(--ink-0); line-height: 1.1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat__meta { font-size: var(--t-sm); color: var(--ink-3); display: flex; align-items: center; gap: 6px; margin-top: 2px;}
.stat__meta .delta.up { color: var(--ok); }
.stat__meta .delta.down { color: var(--err); }
.stat__accent {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent);
  opacity: 0;
}
.stat.is-primary .stat__accent { opacity: 1; }

/* ============ BUTTONS ============ */
.btn {
  --bg: var(--paper-0);
  --fg: var(--ink-1);
  --bd: var(--line-strong);
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--bd);
  background: var(--bg);
  color: var(--fg);
  font-size: var(--t-sm);
  font-weight: 500;
  line-height: 1.2;
  transition: background .1s, border-color .1s;
  white-space: nowrap;
}
.btn:hover { background: var(--paper-2); }
.btn--primary {
  --bg: var(--ink-0);
  --fg: var(--paper-0);
  --bd: var(--ink-0);
}
.btn--primary:hover { --bg: var(--ink-1); }
.btn--accent {
  --bg: var(--accent);
  --fg: white;
  --bd: var(--accent);
}
.btn--accent:hover { filter: brightness(1.08); }
.btn--ghost { --bg: transparent; --bd: transparent; }
.btn--ghost:hover { background: var(--paper-2); }
.btn--danger { --bg: var(--err-tint); --fg: var(--err); --bd: var(--err-tint); }
.btn--sm { padding: 5px 10px; font-size: var(--t-xs); }
.btn--lg { padding: 12px 20px; font-size: var(--t-md); }
.btn--block { width: 100%; justify-content: center; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ============ BADGE / CHIP ============ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 100px;
  font-size: var(--t-xs);
  font-weight: 500;
  background: var(--paper-2);
  color: var(--ink-2);
  border: 1px solid var(--line);
  line-height: 1.3;
  white-space: nowrap;
}
.chip .d { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chip--ok { background: var(--ok-tint); color: var(--ok); border-color: transparent; }
.chip--warn { background: var(--warn-tint); color: oklch(42% 0.14 75); border-color: transparent; }
.chip--err { background: var(--err-tint); color: var(--err); border-color: transparent; }
.chip--info { background: var(--info-tint); color: var(--info); border-color: transparent; }
.chip--accent { background: var(--accent-tint); color: var(--accent-ink); border-color: transparent; }
.chip--solid { background: var(--ink-0); color: var(--paper-0); border-color: transparent; }

/* ============ FORMS ============ */
.field { display: flex; flex-direction: column; gap: 6px; }
.field__label {
  font-size: var(--t-sm);
  font-weight: 500;
  color: var(--ink-1);
  display: flex; align-items: center; gap: 6px;
}
.field__label .req { color: var(--err); }
.field__hint { font-size: var(--t-xs); color: var(--ink-3); }
.field__error { font-size: var(--t-xs); color: var(--err); }
.input, .select, .textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-sm);
  background: var(--paper-0);
  font-size: var(--t-sm);
  color: var(--ink-0);
  outline: none;
  transition: border-color .1s, box-shadow .1s;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-tint);
}
.input[readonly], .input:disabled { background: var(--paper-2); color: var(--ink-2); cursor: not-allowed; }
.input--locked { background: var(--paper-2); color: var(--ink-1); }
.input--locked::after { content: '🔒'; }
.input-group { position: relative; }
.input-group .prefix, .input-group .suffix {
  position: absolute; top: 50%; transform: translateY(-50%);
  color: var(--ink-3); font-family: var(--font-mono); font-size: 11px; pointer-events: none;
}
.input-group .prefix { left: 12px; }
.input-group .suffix { right: 12px; }
.input-group .input.has-prefix { padding-left: 52px; }

.checkbox {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: var(--t-sm); color: var(--ink-1);
  padding: 8px 0; cursor: pointer;
  line-height: 1.5;
}
.checkbox input { margin: 3px 0 0; accent-color: var(--accent); }
.checkbox .sub { color: var(--ink-3); font-size: var(--t-xs); display: block; margin-top: 2px; }

.radio-group { display: flex; gap: 8px; }
.radio {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  background: var(--paper-0);
  cursor: pointer;
  display: flex; gap: 10px; align-items: center;
  font-size: var(--t-sm);
  transition: all .1s;
}
.radio:hover { border-color: var(--ink-3); }
.radio input { accent-color: var(--accent); }
.radio.is-active { border-color: var(--accent); background: var(--accent-tint); color: var(--accent-ink); }

/* ============ TABLE ============ */
.tbl { width: 100%; border-collapse: collapse; font-size: var(--t-sm); }
.tbl th, .tbl td { padding: 12px 16px; text-align: left; vertical-align: middle; }
.tbl thead th {
  font-weight: 500; font-size: 10.5px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-3);
  border-bottom: 1px solid var(--line); background: var(--paper-1);
  font-family: var(--font-mono);
}
.tbl tbody tr { border-bottom: 1px solid var(--line); }
.tbl tbody tr:last-child { border-bottom: 0; }
.tbl tbody tr:hover { background: var(--paper-1); }
.tbl tbody tr.is-active { background: var(--accent-tint); }
.tbl .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.tbl .actions { text-align: right; white-space: nowrap; }
.tbl .muted { color: var(--ink-3); }
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ============ TIMELINE ============ */
.timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
.tl-step {
  display: grid; grid-template-columns: 40px 1fr auto; gap: 16px;
  padding: 16px 0; position: relative;
}
.tl-step:not(:last-child)::before {
  content:''; position: absolute; left: 19px; top: 40px; bottom: -16px;
  width: 2px; background: var(--line);
}
.tl-step.is-done:not(:last-child)::before { background: var(--accent); }
.tl-step__dot {
  width: 40px; height: 40px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--paper-0);
  border: 2px solid var(--line);
  color: var(--ink-3);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  position: relative; z-index: 1;
}
.tl-step.is-done .tl-step__dot { background: var(--accent); border-color: var(--accent); color: white; }
.tl-step.is-current .tl-step__dot {
  border-color: var(--accent); color: var(--accent-ink); background: var(--paper-0);
  box-shadow: 0 0 0 4px var(--accent-tint);
}
.tl-step.is-error .tl-step__dot { background: var(--err); border-color: var(--err); color: white; }
.tl-step__body h5 { margin: 2px 0 2px; font-size: var(--t-md); font-weight: 500; color: var(--ink-0); }
.tl-step__body p { margin: 0; font-size: var(--t-sm); color: var(--ink-3); }
.tl-step__meta { font-size: var(--t-xs); color: var(--ink-3); font-family: var(--font-mono); align-self: start; padding-top: 14px; text-align: right; }

/* ============ STEPPER (HORIZONTAL) ============ */
.stepper {
  display: flex; align-items: center; gap: 0;
  padding: var(--sp-4) 0;
}
.stepper__item { display: flex; align-items: center; gap: 10px; flex: 1; }
.stepper__item:last-child { flex: 0; }
.stepper__dot {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  background: var(--paper-0);
  display: grid; place-items: center;
  font-size: 12px; font-weight: 600; font-family: var(--font-mono);
  color: var(--ink-3);
  flex-shrink: 0;
}
.stepper__item.is-done .stepper__dot { background: var(--accent); border-color: var(--accent); color: white; }
.stepper__item.is-current .stepper__dot {
  border-color: var(--accent); color: var(--accent-ink);
  box-shadow: 0 0 0 4px var(--accent-tint);
}
.stepper__label {
  font-size: var(--t-sm);
  color: var(--ink-3);
  white-space: nowrap;
}
.stepper__item.is-current .stepper__label { color: var(--ink-0); font-weight: 500; }
.stepper__item.is-done .stepper__label { color: var(--ink-1); }
.stepper__line { flex: 1; height: 1.5px; background: var(--line); margin: 0 12px; }
.stepper__item.is-done .stepper__line, .stepper__item.is-current .stepper__line { background: var(--accent); opacity: .4; }

/* ============ UPLOAD ============ */
.upload {
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--r-lg);
  padding: var(--sp-8);
  text-align: center;
  background: var(--paper-1);
  transition: all .15s;
  cursor: pointer;
}
.upload:hover { border-color: var(--accent); background: var(--accent-tint); }
.upload__icon { font-family: var(--font-mono); font-size: 24px; color: var(--ink-3); }
.upload__title { font-size: var(--t-md); font-weight: 500; color: var(--ink-0); margin: 8px 0 4px; }
.upload__hint { font-size: var(--t-xs); color: var(--ink-3); font-family: var(--font-mono); }

.file-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: var(--paper-0);
  font-size: var(--t-sm);
}
.file-row__icon {
  width: 36px; height: 44px;
  background: var(--err-tint);
  color: var(--err);
  border-radius: 3px;
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .04em;
  flex-shrink: 0;
}
.file-row__body { flex: 1; min-width: 0; }
.file-row__name { color: var(--ink-0); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-row__meta { font-size: var(--t-xs); color: var(--ink-3); font-family: var(--font-mono); }

/* ============ NOTICE / ALERT ============ */
.notice {
  display: flex; gap: 12px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  background: var(--info-tint);
  border-left: 3px solid var(--info);
  font-size: var(--t-sm);
  color: var(--ink-1);
}
.notice--warn { background: var(--warn-tint); border-color: var(--warn); }
.notice--err { background: var(--err-tint); border-color: var(--err); }
.notice--ok { background: var(--ok-tint); border-color: var(--ok); }
.notice--accent { background: var(--accent-tint); border-color: var(--accent); }
.notice b { font-weight: 600; color: var(--ink-0); }
.notice__icon { font-family: var(--font-mono); flex-shrink: 0; font-weight: 600; }

/* ============ TWEAKS PANEL ============ */
.tweaks {
  position: fixed; right: 20px; bottom: 20px;
  width: 300px;
  background: var(--paper-0);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
  box-shadow: 0 12px 40px rgba(20,30,50,.12);
  z-index: 1000;
  font-size: var(--t-sm);
}
.tweaks__head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.tweaks__head h4 { margin: 0; font-size: var(--t-sm); font-weight: 600; letter-spacing: .02em; }
.tweaks__head .x { background: none; border: none; color: var(--ink-3); font-size: 16px; }
.tweaks__body { padding: 14px; display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
.tweaks__row { display: flex; flex-direction: column; gap: 6px; }
.tweaks__row > label { font-size: var(--t-xs); color: var(--ink-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; }
.swatches { display: flex; gap: 6px; }
.swatch {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--line);
  cursor: pointer; padding: 0; position: relative;
}
.swatch.is-active { border-color: var(--ink-0); box-shadow: 0 0 0 2px var(--paper-0), 0 0 0 3px var(--ink-0); }
.seg {
  display: flex; gap: 2px; padding: 2px;
  background: var(--paper-2); border-radius: var(--r-sm);
  border: 1px solid var(--line);
}
.seg button {
  flex: 1; padding: 6px 10px; border: none; background: transparent;
  font-size: var(--t-xs); color: var(--ink-2); border-radius: 3px;
  font-family: inherit; white-space: nowrap;
}
.seg button.is-active { background: var(--paper-0); color: var(--ink-0); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,.05); }

/* ============ CERTIFICATE PREVIEW ============ */
.cert {
  aspect-ratio: 1 / 1.414;
  background: var(--paper-0);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 8%;
  position: relative;
  display: flex; flex-direction: column;
  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 20px 40px -20px rgba(0,0,0,.12);
  background-image:
    linear-gradient(var(--accent-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--accent-line) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: center;
  overflow: hidden;
}
.cert::before {
  content:''; position: absolute; inset: 6%;
  border: 1px solid var(--accent-line);
  border-radius: 2px;
  background: var(--paper-0);
}
.cert__inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 4%; }
.cert-grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 32px;
  align-items: flex-start;
}
.cert-card-wrap { padding: 40px; background: var(--paper-1); }
.cert-foot { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: flex-end; font-size: 11px; }

/* ============ PDF viewer mock ============ */
.pdf-viewer {
  background: var(--ink-0);
  border-radius: var(--r-md);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.pdf-viewer__bar {
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  background: oklch(20% 0.012 250);
  color: var(--paper-1);
  font-size: var(--t-xs);
  font-family: var(--font-mono);
  border-bottom: 1px solid oklch(28% 0.012 250);
}
.pdf-viewer__canvas {
  flex: 1; display: grid; place-items: center;
  background: oklch(30% 0.012 250);
  padding: 20px;
  min-height: 400px;
}
.pdf-page {
  background: var(--paper-0);
  aspect-ratio: 1 / 1.3;
  width: 100%; max-width: 420px;
  padding: 40px;
  display: flex; flex-direction: column;
  gap: 14px;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,.3);
  color: var(--ink-1);
}
.pdf-page__line {
  height: 8px; background: var(--paper-3); border-radius: 2px;
}
.pdf-page__line.w80 { width: 80%; }
.pdf-page__line.w60 { width: 60%; }
.pdf-page__line.w40 { width: 40%; }
.pdf-annot {
  position: absolute;
  background: oklch(90% 0.14 75 / 0.4);
  border: 1.5px solid var(--warn);
  border-radius: 2px;
  padding: 2px 4px;
  font-size: 9px;
  color: oklch(30% 0.14 75);
  font-family: var(--font-mono);
  pointer-events: none;
}

/* ============ MISC ============ */
.grid { display: grid; gap: var(--sp-4); }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.flex { display: flex; }
.row { display: flex; align-items: center; gap: var(--sp-3); }
.row--between { justify-content: space-between; }
.col { display: flex; flex-direction: column; gap: var(--sp-3); }
.gap-2 { gap: var(--sp-2); }
.gap-4 { gap: var(--sp-4); }
.gap-6 { gap: var(--sp-6); }
.gap-8 { gap: var(--sp-8); }
.mt-2 { margin-top: var(--sp-2); } .mt-4 { margin-top: var(--sp-4); } .mt-6 { margin-top: var(--sp-6); } .mt-8 { margin-top: var(--sp-8); }
.mb-2 { margin-bottom: var(--sp-2); } .mb-4 { margin-bottom: var(--sp-4); } .mb-6 { margin-bottom: var(--sp-6); } .mb-8 { margin-bottom: var(--sp-8); }
.w-full { width: 100%; }
.muted { color: var(--ink-3); }
.small { font-size: var(--t-xs); }
.divider { height: 1px; background: var(--line); margin: var(--sp-4) 0; }
.pill-dim {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 10px;
  padding: 2px 6px; border-radius: 3px;
  background: var(--paper-2); color: var(--ink-3);
}

/* ============ PLACEHOLDER ART ============ */
.placeholder {
  background: var(--paper-2);
  background-image: repeating-linear-gradient(
    45deg,
    transparent 0, transparent 8px,
    var(--paper-3) 8px, var(--paper-3) 10px
  );
  border: 1px dashed var(--line-strong);
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  color: var(--ink-3);
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
}

/* ============ LOGIN STAGE ============ */
.auth-stage {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--paper-0);
}
.auth-stage__left {
  padding: var(--sp-10);
  display: flex; flex-direction: column;
  justify-content: space-between;
  background: var(--ink-0);
  color: var(--paper-0);
  position: relative;
  overflow: hidden;
}
.auth-stage__left::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, var(--accent) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, oklch(50% 0.08 200) 0, transparent 40%);
  opacity: .15;
}
.auth-stage__left > * { position: relative; z-index: 1; }
.auth-stage__right {
  padding: var(--sp-10);
  display: flex; align-items: center; justify-content: center;
}
.auth-card { width: 100%; max-width: 400px; }
.brand-lg { display: flex; align-items: center; gap: 14px; }
.brand-lg .brand-mark { width: 44px; height: 44px; font-size: 16px; border-radius: 8px; }
.brand-lg .brand-txt b { font-size: 17px; letter-spacing: .01em; }
.brand-lg .brand-txt span { font-size: 11px; font-family: var(--font-mono); letter-spacing: .08em; color: var(--ink-3); text-transform: uppercase; }
.auth-stage__left .brand-lg .brand-txt b { color: var(--paper-0); }
.auth-stage__left .brand-lg .brand-txt span { color: oklch(70% 0.01 250); }
.auth-stage__left .brand-lg .brand-mark { background: var(--paper-0); color: var(--ink-0); }

.sso-btn {
  width: 100%;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  background: var(--paper-0);
  font-size: var(--t-md);
  color: var(--ink-0);
  font-weight: 500;
  transition: all .1s;
  text-align: left;
}
.sso-btn:hover { border-color: var(--accent); background: var(--accent-tint); }
.sso-btn__ico {
  width: 32px; height: 32px; border-radius: 6px;
  display: grid; place-items: center;
  background: var(--paper-2);
  color: var(--ink-0);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
}
.sso-btn__sub { display: block; font-size: var(--t-xs); font-weight: 400; color: var(--ink-3); margin-top: 2px; }

/* ============ HAMBURGER + SIDEBAR OVERLAY ============ */
.ham-btn { display: none; }
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(10,15,25,.45);
  z-index: 99;
  backdrop-filter: blur(2px);
}

/* ≤1024px — small laptop */
@media (max-width: 1024px) {
  :root { --sidebar-w: 210px; }
  .page { padding: var(--sp-6) var(--sp-6) var(--sp-10); }
  .topbar__search { width: 220px; }
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

/* ≤768px — tablet */
@media (max-width: 768px) {
  html { overflow-x: hidden; }
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: var(--sidebar-w);
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.15);
  }
  .sidebar.is-open { transform: translateX(0); }
  .ham-btn { display: grid; }
  .topbar__search { width: 180px; }
  .topbar__search kbd { display: none; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .auth-stage { grid-template-columns: 1fr; }
  .cert-grid { grid-template-columns: 1fr; }
  .cert-card-wrap { padding: 24px; }
  .auth-stage__left { display: none; }
  .tbl--stack th:nth-child(5), .tbl--stack td:nth-child(5) { display: none; }
}

/* ≤480px — mobile */
@media (max-width: 480px) {
  .page { padding: var(--sp-4) var(--sp-4) var(--sp-8); }
  .topbar { padding: 0 var(--sp-4); gap: var(--sp-2); }
  .topbar .seg { display: none; }
  .crumb { flex: 1; min-width: 0; overflow: hidden; }
  .crumb span:not(.here), .crumb .sep { display: none; }
  .crumb .here { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .topbar__search { display: none; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .cert-card-wrap { padding: var(--sp-4); }
  .cert-foot { grid-template-columns: 1fr 1fr; gap: 12px; }
  .cert-foot > :last-child { display: none; }
  .page__title { font-size: var(--t-2xl); }
  .stat__value { font-size: var(--t-2xl); }
  .tl-step { grid-template-columns: 32px 1fr; }
  .tl-step__meta { display: none; }
  .tweaks { width: calc(100vw - 24px); right: 12px; bottom: 12px; }
  .card__body { padding: var(--sp-4); }
  body { overflow-x: hidden; }
  .stepper__label { display: none; }
  .stepper__item.is-current .stepper__label { display: block; font-size: var(--t-xs); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .stepper__line { margin: 0 6px; }
  .card__stepper-head { padding: 6px 16px; }
  .card__body--form { padding: var(--sp-4); }
  .card__footer { padding: 12px 16px; flex-wrap: wrap; }
  .card__footer__actions { margin-left: 0; flex-wrap: wrap; }
  .review-section-head { padding: 10px 14px; }
  .review-row { grid-template-columns: 1fr; gap: 2px; padding: 10px 14px; }
  .review-row .muted { font-size: var(--t-xs); color: var(--ink-3); }
  .radio-group { flex-direction: column; }
  .tbl--stack thead { display: none; }
  .tbl--stack tbody tr { display: block; padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--line); }
  .tbl--stack tbody td { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border: none; gap: var(--sp-2); }
  .tbl--stack tbody td::before { content: attr(data-label); font-size: 10px; color: var(--ink-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0; min-width: 86px; }
  .tbl--stack tbody td.actions { justify-content: flex-end; padding-top: var(--sp-2); margin-top: 2px; border-top: 1px solid var(--line); }
  .tbl--stack tbody td.actions::before { display: none; }
}

// ===== TWEAKS DEFAULTS =====
const TWEAK_DEFAULTS = {
  "accentHue": 170,
  "density": "compact",
  "theme": "light",
  "state": "active"
};

const PAGE_MAP = {
  applicant: {
    pages: ['dashboard', 'new', 'timeline', 'revise', 'certificate'],
    crumb: {
      dashboard:   ['ผู้ตรวจประเมิน', 'หน้าหลัก'],
      new:         ['ผู้ตรวจประเมิน', 'ยื่นคำขอใหม่'],
      timeline:    ['ผู้ตรวจประเมิน', 'ติดตามสถานะ'],
      revise:      ['ผู้ตรวจประเมิน', 'แก้ไขเอกสาร'],
      certificate: ['ผู้ตรวจประเมิน', 'ใบรับรอง'],
      guide:       ['ผู้ตรวจประเมิน', 'คู่มือ'],
      contact:     ['ผู้ตรวจประเมิน', 'ติดต่อ'],
    },
  },
  staff: {
    pages: ['dashboard', 'queue', 'review', 'approvals', 'batch', 'reports'],
    crumb: {
      dashboard: ['เจ้าหน้าที่ พพ.', 'ภาพรวม'],
      queue:     ['เจ้าหน้าที่ พพ.', 'คิวตรวจสอบ'],
      review:    ['เจ้าหน้าที่ พพ.', 'คิว', 'ตรวจสอบเอกสาร'],
      approvals: ['เจ้าหน้าที่ พพ.', 'e-Approval'],
      batch:     ['เจ้าหน้าที่ พพ.', 'พิมพ์สรุปรายชื่อ'],
      reports:   ['เจ้าหน้าที่ พพ.', 'รายงาน'],
    },
  },
  admin: {
    pages: ['users', 'master', 'templates', 'audit', 'documents'],
    crumb: {
      users:     ['Admin', 'ผู้ใช้งาน'],
      master:    ['Admin', 'ข้อมูลหลัก'],
      templates: ['Admin', 'เทมเพลต'],
      audit:     ['Admin', 'Audit Log'],
      documents: ['Admin', 'ค้นหาเอกสาร'],
    },
  },
};

function App() {
  const [route, setRoute] = useState({ view: 'login-applicant' });
  const [role, setRole] = useState('applicant');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    document.documentElement.setAttribute('data-density', tweaks.density);
    document.documentElement.style.setProperty('--accent', `oklch(45% 0.085 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-ink', `oklch(38% 0.09 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-tint', `oklch(95% 0.025 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-line', `oklch(82% 0.05 ${tweaks.accentHue})`);
  }, [tweaks]);

  const applications = React.useMemo(() => {
    if (tweaks.state === 'empty')      return [];
    if (tweaks.state === 'first-time') return APPLICATIONS.filter(a => a.status === 'reviewing').slice(0,1);
    if (tweaks.state === 'completed')  return APPLICATIONS.filter(a => a.status === 'completed');
    return APPLICATIONS;
  }, [tweaks.state]);

  const go = (view, id) => {
    if (view === '__logout') {
      setRoute({ view: role === 'applicant' ? 'login-applicant' : 'staff-login' });
      return;
    }
    setRoute({ view, id });
    window.scrollTo(0, 0);
  };

  const switchRole = (r) => {
    setRole(r);
    setRoute({ view: r === 'admin' ? 'users' : 'dashboard' });
    window.scrollTo(0, 0);
  };

  const ctx = { role, page: route.view, go, switchRole, state: { applications }, tweaks, setTweaks };

  const Placeholder = ({ title, sub }) => (
    <div className="page">
      <div className="page__head">
        <div className="page__eyebrow">หน้าในระบบ</div>
        <h1 className="page__title">{title}</h1>
        <p className="page__sub">{sub}</p>
      </div>
      <div className="card">
        <div className="card__body" style={{padding:64, textAlign:'center'}}>
          <div className="placeholder" style={{width:'100%', height:320, marginBottom:16}}>screen layout</div>
          <div className="muted small">หน้านี้อยู่ใน scope ของ journey และจะออกแบบในรอบถัดไป</div>
        </div>
      </div>
    </div>
  );

  const renderPage = () => {
    const v = route.view;
    if (v === 'login-applicant') return <LoginApplicant/>;
    if (v === 'staff-login')     return <LoginStaff/>;
    if (v === 'verify')          return <PublicVerify/>;

    const pages = {
      dashboard:   role === 'applicant' ? <ApplicantDashboard/> : <StaffDashboard/>,
      new:         <NewApplication/>,
      timeline:    <Timeline/>,
      revise:      <Revision/>,
      certificate: <Certificate/>,
      guide:       <Placeholder title="คู่มือการใช้งาน" sub="เอกสาร PDF และ วิดีโอแนะนำการใช้งานระบบ"/>,
      contact:     <Placeholder title="ติดต่อเจ้าหน้าที่" sub="ช่องทางสอบถาม / แจ้งปัญหา"/>,
      queue:       <StaffQueue/>,
      review:      <StaffReview/>,
      approvals:   <Placeholder title="e-Approval" sub="ผู้จัดการลงนามอิเล็กทรอนิกส์ (OTP / DGA Digital Sign)"/>,
      batch:       <Placeholder title="พิมพ์สรุปรายชื่อ (Step 3)" sub="Generate File 1–4 ผ่าน Worker Queue"/>,
      reports:     <Placeholder title="Analytics & Reports" sub="สถิติรายเดือน/รายปี · Export XLSX/PDF"/>,
      users:       <AdminUsers/>,
      master:      <AdminMaster/>,
      templates:   <Placeholder title="Template Management" sub="เทมเพลต Word (File 1–4) + Version control"/>,
      audit:       <Placeholder title="Audit Log" sub="Login · action · IP · timestamp · retention 1 year"/>,
      documents:   <Placeholder title="Document Search" sub="ค้นหาและดาวน์โหลดเอกสารด้วย Signed URL (15 min)"/>,
    };

    const meta = PAGE_MAP[role];
    const crumb = meta && meta.crumb[v] ? meta.crumb[v] : ['BEC Platform', v];
    const body = pages[v] || <Placeholder title="หน้าไม่พบ" sub={v}/>;
    return <Shell crumb={crumb}>{body}</Shell>;
  };

  const HUES = [
    { label: 'Teal',   v: 170 },
    { label: 'Navy',   v: 245 },
    { label: 'Green',  v: 150 },
    { label: 'Amber',  v: 70  },
    { label: 'Plum',   v: 310 },
  ];

  const TweaksPanel = () => {
    const update = (k, v) => setTweaks(t => ({ ...t, [k]: v }));
    return (
      <div className="tweaks">
        <div className="tweaks__head">
          <h4>Tweaks</h4>
          <button className="x" onClick={() => setTweaksOpen(false)}>×</button>
        </div>
        <div className="tweaks__body">
          <div className="tweaks__row">
            <label>Accent hue</label>
            <div className="swatches">
              {HUES.map(h => (
                <button key={h.v} title={h.label}
                  className={`swatch ${tweaks.accentHue === h.v ? 'is-active' : ''}`}
                  style={{background: `oklch(45% 0.085 ${h.v})`}}
                  onClick={() => update('accentHue', h.v)}/>
              ))}
            </div>
          </div>
          <div className="tweaks__row">
            <label>Theme</label>
            <div className="seg">
              <button className={tweaks.theme==='light'?'is-active':''} onClick={()=>update('theme','light')}>Light</button>
              <button className={tweaks.theme==='dark'?'is-active':''} onClick={()=>update('theme','dark')}>Dark</button>
            </div>
          </div>
          <div className="tweaks__row">
            <label>Density</label>
            <div className="seg">
              <button className={tweaks.density==='comfortable'?'is-active':''} onClick={()=>update('density','comfortable')}>Comfortable</button>
              <button className={tweaks.density==='compact'?'is-active':''} onClick={()=>update('density','compact')}>Compact</button>
            </div>
          </div>
          <div className="tweaks__row">
            <label>Applicant state</label>
            <div className="seg">
              <button className={tweaks.state==='empty'?'is-active':''} onClick={()=>update('state','empty')}>Empty</button>
              <button className={tweaks.state==='first-time'?'is-active':''} onClick={()=>update('state','first-time')}>1 คำขอ</button>
              <button className={tweaks.state==='active'?'is-active':''} onClick={()=>update('state','active')}>Active</button>
            </div>
          </div>
          <div className="tweaks__row">
            <label>Jump to screen</label>
            <div style={{display:'flex', flexDirection:'column', gap:4}}>
              {[
                ['login-applicant','Login (ผู้ยื่น)'],
                ['staff-login','Login (เจ้าหน้าที่)'],
                ['verify','Public Verify'],
                ['dashboard','Dashboard'],
                ['new','ยื่นคำขอ 4 steps'],
                ['timeline','Timeline'],
                ['revise','แก้ไขเอกสาร'],
                ['certificate','ใบรับรอง'],
                ['queue','Queue'],
                ['review','Review + PDF'],
                ['users','Users (Admin)'],
                ['master','Master Data'],
              ].map(([k,l]) => (
                <button key={k} className="btn btn--sm"
                  style={{justifyContent:'flex-start', background: route.view===k?'var(--accent-tint)':'var(--paper-0)', borderColor:'var(--line)', color: route.view===k?'var(--accent-ink)':'var(--ink-2)', fontWeight: route.view===k?500:400}}
                  onClick={()=>go(k)}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <AppCtx.Provider value={ctx}>
      {renderPage()}
      <button
        onClick={()=>setTweaksOpen(o=>!o)}
        style={{position:'fixed', bottom:20, right:tweaksOpen?324:20, zIndex:999, width:40, height:40, borderRadius:'50%', background:'var(--ink-0)', color:'var(--paper-0)', border:'none', fontSize:16, boxShadow:'0 4px 16px rgba(0,0,0,.2)', cursor:'pointer', transition:'right .2s'}}
        title="Tweaks"
      >⚙</button>
      {tweaksOpen && <TweaksPanel/>}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
